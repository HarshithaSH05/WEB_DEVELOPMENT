<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: oldlace;
            font-family: 'Times New Roman', Times, serif;
            color: purple;
            text-align: center;
            text-shadow: 0 2px 4px black ;

            background-image: url('https://images.pexels.com/photos/6633007/pexels-photo-6633007.jpeg');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;    /* background img will not move as u scroll */
        }
    </style>
</head>
<body>
    <h1>Welcome to my website</h1>
    <div style="height: 1500px;">        <!-- div container height. As height is large, scroll bar will be created -->
        <h1>Netflix . Chill</h1>
    </div>
</body>
</html>
