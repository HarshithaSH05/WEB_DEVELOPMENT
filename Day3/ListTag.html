<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ol>
        <li>Chocolate</li>
        <li>Ice-cream</li>
        <li>Car</li>
    </ol>

    <ol type="i">
        <li>Chocolate</li>
        <li>Ice-cream</li>

    <ul type="circle">    <!--also use square-->

        <li>Ice-cream</li>
        <li>Car</li>
    </ul>

    <ul>
        <li>Chocolate</li>
        <li>Ice-cream</li>
        <li>Car</li>
    </ul>
</body>
</html>
