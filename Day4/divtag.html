<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Div: It is block level tag. It takes 100% width of space -->
    <div style="background-color: aquamarine;">
        <h2>Menu</h2>
        <ol>
            <li>Pizza</li>
            <li>Coke</li>
        </ol>
    </div>

    <div style="background-color: antiquewhite;">
        <h2>Review</h2>
        <strong>good restaurant</strong>
        <p>_sarah⭐⭐⭐⭐⭐</p>
    </div>

    <!-- Span tag: Takes only required amount of width. It is a inline tag.
     Can be added inside any other html tag -->
    
    <span style="background-color: blueviolet;">Login</span>
    <button>Cart <span>0</span></button>

</body>
</html>
