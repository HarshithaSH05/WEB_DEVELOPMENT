<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* How to select tag by id name 
        Rule - Use . symbol - .ClassName */

        .abc{
            color: chocolate;
            text-align: center;
            font-family: cursive;
        }

    </style>
</head>
<body>
    <!-- class - when we hv diff html tags & we need to give same styling for all, we use class attribute. we hv to make them under same class -->
    <h1 class="abc">College</h1>
    <p class="abc">Students</p>
    <div class="abc">Canteen</div>
</body>
</html>
