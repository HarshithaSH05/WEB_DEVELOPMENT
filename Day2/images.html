<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image tag</title>
</head>
<body>
    <!-- Image tag- Adding image on webpage img tag -->
    <!-- 2 ways: 1. from internet- copy img address  -->
    <!-- (i) platforms: pexels or unsplash -->
    <!-- height & width : adjust size of img  -->
    <h2>Coffee</h2>
    <img src="https://images.pexels.com/photos/6813796/pexels-photo-6813796.jpeg" height="500" width="500">
    <hr>

    <!-- 2. download & add from ur sys -->
     <h2>Headphones</h2>
     <img src="headphone.avif" height="500" width="500">
</body>
</html>
