<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        /* Box model - Margin, Padding, Border
        Padding - Space between border & content or Space inside border in all 4 directions
        Border -  Value Type Color  ex:1px solid black
        Margin - Outside border in all 4 directions  ex:space b/w 2 box */

        body{
            background-color: antiquewhite;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;           /* display div contents side by side - row format. By defualt col display  */
            justify-content: center;
            align-items: center;
        }

        .product{
            background-color: white;
            width: 300px;          /* div container size  */
            border: 1px solid brown;
            margin: 30px;
            padding: 25px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0px 5px 15px black ;     /* Box shadow - X-axis y-axis spread_radius shadow_color */

        }

        .product img{
            object-fit: cover;
            width: 100%;
            height: 300px;
            border-radius: 12px;

        }

        .product button{
            background-color: cadetblue;
            border: none;
            padding: 15px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
        }

        button:hover{
            background-color: blue;
            transform: scale(1.02);
            transition: 2s;
        }
    </style>
</head>
<body>
    <div class="product">
        <img src="https://images.pexels.com/photos/47261/pexels-photo-47261.jpeg">
        <h2>Iphone</h2>
        <p><del>&100</del> $50</p>
        <button>Add to cart</button>
    </div>

    <div class="product">
        <img src="https://images.pexels.com/photos/7887198/pexels-photo-7887198.jpeg">
        <h2>Shoe</h2>
        <p>$25</p>
        <button>Add to cart</button>
    </div>

    <div class="product">
        <img src="https://images.pexels.com/photos/943596/pexels-photo-943596.jpeg">
        <h2>Laptop</h2>
        <p>$100</p>
        <button>Add to cart</button>
    </div>
</body>
</html>
