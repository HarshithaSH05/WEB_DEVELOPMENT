<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- video: mp4 -->
    <!-- syntax for adding video  -->
    <!-- <video>
        <source src="Location/address " type="video/mp4">
    </video> -->
    <!-- Controls: to insert play, pause etc options -->
    <!-- loop: to repeat video again & again  -->
    <!-- autoplay: no need of clicking play/pause button  -->

    <video controls  loop autoplay height="800" width="1000">
        <source src="https://www.pexels.com/download/video/14854556/" type="video/mp4">
    </video>

    <!-- Audio: mp3 -->
     <audio controls loop autoplay>
        <source src="./cracious-musical-plays-402493.mp3" type="audio/mp3">
     </audio>
</body>
</html>
