<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <select>
        <option>kannada</option>
        <option label="eng">english</option>  <!--label: to print short form-->
        <option>hindi</option>
        <option selected>languages</option>   <!-- selected: to bring at top like it appears before u click dropdown button --> 
        <option disabled>french</option>  
      </select>

      <input list="menu">    <!--list="menu" it connects input(from user) to datalist(dropdown option)-->

      <datalist id="menu">         <!-- id: to give unique identification to this datalist -->
        <option value="pizza"></option>
        <option value="pasta"></option>
        <option value="biryani"></option>
        <option value="coke"></option>
      </datalist>
</body>
</html>
